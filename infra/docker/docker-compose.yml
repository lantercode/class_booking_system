services:
  postgres:
    image: postgres:15-alpine
    container_name: dance-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dance_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dance_saas}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dance} -d ${POSTGRES_DB:-dance_saas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      redis:
        condition: service_healthy  # ✅ 等 Redis 就绪再启动 API
    environment:
      - REDIS_URL=redis://redis:6379/0  # 使用 Docker 内部网络

  redis:
    image: redis:7-alpine
    container_name: dance-saas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
